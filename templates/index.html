<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดตารางส่งสินค้า</title>

<body>

<!-- TOP BAR -->
<header class="topbar">

    <span class="logo">🚚 <span class="logo-text">ระบบจัดตารางส่งสินค้า</span></span>
    <nav class="date-nav">
      <button onclick="changeDate(-1)">&#8592;</button>
      <input type="date" id="mainDate" onchange="loadRoute()">

  <div class="topbar-right">
    <a class="btn btn-outline" href="/accounting" title="ระบบบัญชี" style="text-decoration:none">📒 ระบบบัญชี</a>
    <button class="btn btn-outline" onclick="openProductModal()">⚙ ตั้งค่าสินค้า</button>
    <button class="btn btn-outline" onclick="window.print()">🖨 พิมพ์</button>
    <span class="pal-switch" title="สลับโทนสี">
      <button class="pal-dot" data-pal="clay"  onclick="setPalette('clay')"  style="background:#c2683f" title="Warm Clay" aria-label="โทน Warm Clay"></button>
      <button class="pal-dot" data-pal="teal"  onclick="setPalette('teal')"  style="background:#d2a23e" title="Dusty Teal" aria-label="โทน Dusty Teal"></button>
      <button class="pal-dot" data-pal="denim" onclick="setPalette('denim')" style="background:#34414e" title="Faded Denim" aria-label="โทน Faded Denim"></button>
    </span>
    <button class="btn btn-outline theme-toggle" id="themeToggle" onclick="toggleTheme()" title="มืด/สว่าง">🌙</button>
    <button class="btn btn-primary" onclick="openStopModal()">+ เพิ่มจุดส่ง</button>
  </div>
</header>

<!-- MOBILE TAB BAR -->
<div class="mobile-tabs no-print">
  <button class="mobile-tab active" id="tabMap" onclick="switchTab('map')">🗺 แผนที่</button>
  <button class="mobile-tab" id="tabList" onclick="switchTab('list')">📋 รายการส่ง</button>
</div>

<!-- MAIN LAYOUT -->
<div class="app-body">

  <!-- LEFT: MAP -->
  <div class="map-panel" id="mapPanel">
    <div class="map-search-bar no-print">
      <div class="search-input-wrap">
        <span class="search-icon" id="searchIcon">📍</span>
        <input id="addressSearch" type="text" placeholder="พิมพ์ที่อยู่ หรือวาง Link Google Maps..." autocomplete="off" onkeydown="onSearchKey(event)" onpaste="handlePaste(event)">
        <button class="btn btn-sm btn-primary" onclick="searchAndAdd()">+ เพิ่ม</button>
      </div>
      <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
    <div id="map"></div>

    <!-- Globe loader overlay -->
    <div id="globeOverlay" class="globe-overlay" style="display:none">
      <div class="globe-overlay-box">
        <div style="position:relative;width:200px;height:200px;">
          <canvas id="globeWhirl" width="200" height="200" style="position:absolute;top:0;left:0;"></canvas>
          <canvas id="globeCanvas" width="200" height="200" style="position:absolute;top:0;left:0;"></canvas>
        </div>
      </div>
    </div>

    <div class="map-bottom-bar no-print">
      <span id="mapStatus" class="map-status">📍 พิมพ์ที่อยู่ด้านบนเพื่อเพิ่มจุดส่ง</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" id="myLocBtn" onclick="startMyLocation()" style="background:#2d3748;color:white">📍 ตำแหน่งฉัน</button>
        <button class="btn btn-sm btn-gmaps" id="gmapsBtn" onclick="openGoogleMaps()" style="display:none">🗺 Google Maps</button>
      </div>
    </div>
  </div>

  <!-- RESIZE HANDLE -->
  <div id="resizeHandle" class="resize-handle no-print"></div>

  <!-- RIGHT: DELIVERY SHEET -->
  <div class="sheet-panel" id="sheetPanel">

    <!-- Route header -->
    <div class="route-header" id="routeHeader">
      <div class="rh-left">
        <span>ผู้ส่ง</span>
        <input id="driverName" placeholder="ชื่อผู้ส่ง" onblur="saveRouteHeader()">
        <input id="driverPhone" placeholder="เบอร์โทร" onblur="saveRouteHeader()">
        <input id="truckNumber" placeholder="บร-XXXX" onblur="saveRouteHeader()">
      </div>
      <div class="rh-right">
        <span id="routeDateDisplay" class="route-date"></span>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="deliveryTable">
        <thead>
          <tr>
            <th rowspan="2" class="col-seq">ลำดับ</th>
            <th rowspan="2" class="col-addr">ที่อยู่ลูกค้า</th>
            <th colspan="6" class="col-products-header">สินค้า (ลัง)</th>
            <th rowspan="2" class="col-price">ราคา</th>
            <th rowspan="2" class="col-action no-print">จัดการ</th>
          </tr>
          <tr id="productHeaders"></tr>
        </thead>
        <tbody id="stopTableBody"></tbody>
        <tfoot id="stopTableFoot"></tfoot>
      </table>
      <div id="emptyState" class="empty-state">ยังไม่มีจุดส่งสินค้า — กด "+ เพิ่มจุดส่ง"</div>
    </div>

    <!-- Notes -->
    <div id="routeNotes" class="route-notes"></div>
  </div>

</div>

<!-- STOP DRAWER -->
<div id="stopDrawer" class="drawer">
  <div class="drawer-header">
    <h2 id="stopDrawerTitle">เพิ่มจุดส่ง</h2>
    <button class="close-btn" onclick="closeDrawer()">✕</button>
  </div>
  <form id="stopForm" onsubmit="saveStop(event)">
    <input type="hidden" id="stopId">
    <div class="drawer-body">
      <div class="dform-group">
        <label>ชื่อลูกค้า / จุดส่ง *</label>
        <input id="stopCustomer" required placeholder="เช่น Golden Place ราชวัลลภที่ 1">
      </div>
      <div class="dform-group">
        <label>ที่อยู่ *</label>
        <textarea id="stopAddress" required placeholder="ที่อยู่สำหรับปักหมุดแผนที่"></textarea>
      </div>
      <div class="dform-row">
        <div class="dform-group">
          <label>หมายเหตุ</label>
          <input id="stopNote" placeholder="เช่น 12.40 น.">
        </div>
        <div class="dform-group">
          <label>ราคา (บาท)</label>
          <input type="number" id="stopPrice" min="0" placeholder="0" onfocus="openCalcForPrice()" autocomplete="off">
        </div>
      </div>
      <div class="dform-group">
        <label>สถานะ</label>
        <select id="stopStatus">
          <option value="รอส่ง">รอส่ง</option>
          <option value="กำลังส่ง">กำลังส่ง</option>
          <option value="ส่งแล้ว">ส่งแล้ว</option>
          <option value="ยกเลิก">ยกเลิก</option>
        </select>
      </div>
      <div class="dform-group">
        <label>จำนวนสินค้า (ลัง)</label>
        <div class="qty-grid" id="qtyGrid"></div>
      </div>
    </div>
    <div class="drawer-footer">
      <button type="button" class="btn btn-secondary" onclick="closeDrawer()">ยกเลิก</button>
      <button type="submit" class="btn btn-primary">💾 บันทึก</button>
    </div>
  </form>

  <!-- CALCULATOR POPUP (inside drawer) -->
  <div id="calcPopup" class="calc-popup" role="dialog" aria-label="เครื่องคิดเลข">
    <div class="calc-screen">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-val" id="calcVal">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn ac"    onclick="calcAC()">AC</button>
      <button class="calc-btn op"    onclick="calcOp('±')">±</button>
      <button class="calc-btn pct"   onclick="calcOp('%')">%</button>
      <button class="calc-btn op"    onclick="calcOp('÷')">÷</button>
      <button class="calc-btn num"   onclick="calcDigit('7')">7</button>
      <button class="calc-btn num"   onclick="calcDigit('8')">8</button>
      <button class="calc-btn num"   onclick="calcDigit('9')">9</button>
      <button class="calc-btn op"    onclick="calcOp('×')">×</button>
      <button class="calc-btn num"   onclick="calcDigit('4')">4</button>
      <button class="calc-btn num"   onclick="calcDigit('5')">5</button>
      <button class="calc-btn num"   onclick="calcDigit('6')">6</button>
      <button class="calc-btn op"    onclick="calcOp('−')">−</button>
      <button class="calc-btn num"   onclick="calcDigit('1')">1</button>
      <button class="calc-btn num"   onclick="calcDigit('2')">2</button>
      <button class="calc-btn num"   onclick="calcDigit('3')">3</button>
      <button class="calc-btn op"    onclick="calcOp('+')">+</button>
      <button class="calc-btn num zero" onclick="calcDigit('0')">0</button>
      <button class="calc-btn num"   onclick="calcDot()">.</button>
      <button class="calc-btn eq"    onclick="calcEquals()">=</button>
      <button class="calc-btn ok" style="grid-column:span 3" onclick="calcConfirm()">✓ ใส่ราคา</button>
      <button class="calc-btn cls"   onclick="calcClose()">✕</button>
    </div>
  </div>
</div>
<div id="drawerBackdrop" class="drawer-backdrop" onclick="closeDrawer()"></div>


<!-- PRODUCT MODAL -->
<div id="productModal" class="modal-overlay" onclick="closeOnBackdrop(event,'productModal')">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>ตั้งค่าชื่อสินค้า</h2>
      <button class="close-btn" onclick="closeModal('productModal')">✕</button>
    </div>
    <div style="padding:20px 24px" id="productInputs"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('productModal')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveProducts()">บันทึก</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/script.js"></script>
<script type="module">
import * as d3 from 'https://esm.sh/d3-geo@3';
import * as topojson from 'https://esm.sh/topojson-client@3';

const DPR=Math.min(window.devicePixelRatio||1,3);
const SIZE=200, W=SIZE*DPR, R=88*DPR, cx=W/2, cy=W/2;
const gc=document.getElementById('globeCanvas');
const wc=document.getElementById('globeWhirl');
[gc,wc].forEach(c=>{ c.width=W; c.height=W; c.style.width=SIZE+'px'; c.style.height=SIZE+'px'; });
const gx=gc.getContext('2d'), wx=wc.getContext('2d');
const sphere={type:'Sphere'};
let rot=0, wrot=0, rafId=null, worldLoaded=false;
let land, borders, graticule, proj, path;
let isDragging=false, dragX=0, dragY=0, phi=-20, spinV=0.28;

async function initGlobe(){
  if(worldLoaded) return;
  const world=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
  land=topojson.feature(world,world.objects.land);
  borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  graticule=d3.geoGraticule()();
  proj=d3.geoOrthographic().scale(R).translate([cx,cy]).clipAngle(90);
  path=d3.geoPath(proj,gx);
  worldLoaded=true;
}

function isDark(){ return document.body.classList.contains('dark'); }


function drawGlobe(){
  const dark=isDark();
  gx.clearRect(0,0,W,W);
  gx.beginPath(); path(sphere);
  gx.fillStyle=dark?'#0f172a':'#f0efe9'; gx.fill();
  gx.beginPath(); path(graticule);
  gx.strokeStyle=dark?'rgba(148,163,184,0.12)':'rgba(0,0,0,0.07)'; gx.lineWidth=0.4*DPR; gx.stroke();
  gx.beginPath(); path(land);
  gx.fillStyle='rgba(0,0,0,0)'; gx.fill();
  gx.strokeStyle=dark?'rgba(148,163,184,0.85)':'rgba(30,28,26,0.8)'; gx.lineWidth=0.75*DPR; gx.stroke();
  gx.beginPath(); path(borders);
  gx.strokeStyle=dark?'rgba(148,163,184,0.2)':'rgba(30,28,26,0.2)'; gx.lineWidth=0.3*DPR; gx.stroke();
  gx.beginPath(); path(sphere);
  gx.strokeStyle=dark?'rgba(100,116,139,0.4)':'rgba(0,0,0,0.18)'; gx.lineWidth=1*DPR; gx.stroke();
}

function drawWhirl(){
  const dark=isDark();
  const base_rgb=dark?'148,163,184':'30,28,26';
  wx.clearRect(0,0,W,W);
  const outerR=R+9*DPR, segs=50, sweep=Math.PI*0.7;
  for(let a=0;a<3;a++){
    const base=wrot+(a/3)*Math.PI*2;
    for(let i=0;i<segs;i++){
      const t=i/segs;
      const angle=base+t*sweep;
      const ox=cx+Math.cos(angle)*outerR, oy=cy+Math.sin(angle)*outerR;
      const nx=cx+Math.cos(angle+sweep/segs)*outerR, ny=cy+Math.sin(angle+sweep/segs)*outerR;
      wx.beginPath(); wx.moveTo(ox,oy); wx.lineTo(nx,ny);
      wx.strokeStyle=`rgba(${base_rgb},${Math.sin(t*Math.PI)*0.3})`;
      wx.lineWidth=(0.8+Math.sin(t*Math.PI)*1.6)*DPR;
      wx.lineCap='round'; wx.stroke();
    }
  }
}

function tick(){
  if(!isDragging){ rot+=spinV; }
  wrot-=0.024;
  proj.rotate([rot,phi,0]);
  drawGlobe(); drawWhirl();
  rafId=requestAnimationFrame(tick);
}

function setupDrag(){
  const wrap=document.querySelector('.globe-overlay-box>div');
  wrap.style.cursor='grab';
  wrap.addEventListener('mouseenter',()=>{ spinV=0; });
  wrap.addEventListener('mouseleave',()=>{ if(!isDragging) spinV=0.28; });
  wrap.addEventListener('mousedown',e=>{
    isDragging=true; dragX=e.clientX; dragY=e.clientY;
    wrap.style.cursor='grabbing'; e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!isDragging) return;
    rot+=(e.clientX-dragX)*0.5;
    phi-=(e.clientY-dragY)*0.3;
    phi=Math.max(-75,Math.min(75,phi));
    dragX=e.clientX; dragY=e.clientY;
  });
  window.addEventListener('mouseup',()=>{
    if(!isDragging) return;
    isDragging=false; spinV=0.28;
    wrap.style.cursor='grab';
    const springPhi=()=>{
      phi+= (-20-phi)*0.08;
      if(Math.abs(phi-(-20))>0.1) requestAnimationFrame(springPhi);
      else phi=-20;
    };
    requestAnimationFrame(springPhi);
  });
}

window.startGlobeLoader=async function(){
  await initGlobe();
  document.getElementById('globeOverlay').style.display='flex';
  if(!rafId) tick();
};
window.stopGlobeLoader=function(){
  const overlay=document.getElementById('globeOverlay');
  const box=overlay.querySelector('.globe-overlay-box');
  if(!overlay||overlay.dataset.settled) return;
  overlay.dataset.settled='1';

  // Snapshot current absolute position of box inside overlay
  const br=box.getBoundingClientRect(), or=overlay.getBoundingClientRect();
  const startTop=br.top-or.top, startLeft=br.left-or.left;
  box.style.top=startTop+'px'; box.style.left=startLeft+'px';
  box.offsetHeight; // reflow

  // Fade out blur + bg
  overlay.style.transition='background 0.7s ease, backdrop-filter 0.7s ease, -webkit-backdrop-filter 0.7s ease';
  overlay.style.background='transparent';
  overlay.style.backdropFilter='none';
  overlay.style.webkitBackdropFilter='none';

  // Animate to bottom-left corner (above bottom bar), scale down
  const scale=0.34, padL=16, padB=58;
  const targetTop=overlay.offsetHeight-200*scale-padB;
  const targetLeft=padL;
  box.style.transition='top 1s cubic-bezier(0.4,0,0.2,1), left 1s cubic-bezier(0.4,0,0.2,1), transform 1s cubic-bezier(0.4,0,0.2,1)';
  box.style.top=targetTop+'px';
  box.style.left=targetLeft+'px';
  box.style.transform='scale('+scale+')';
  setTimeout(()=>box.classList.add('globe-corner-widget'),800);
};

// Globe show/hide with map-click corner animation + 3-min idle return
let globeVisible=true, idleTimer=null;
const IDLE_MS=3*60*1000;

function showGlobe(){
  if(globeVisible) return;
  globeVisible=true;
  const overlay=document.getElementById('globeOverlay');
  const box=overlay.querySelector('.globe-overlay-box');
  box.classList.remove('globe-corner-widget');
  // Restore backdrop
  overlay.style.transition='background 0.7s ease, backdrop-filter 0.7s ease, -webkit-backdrop-filter 0.7s ease';
  overlay.style.background='';
  overlay.style.backdropFilter='';
  overlay.style.webkitBackdropFilter='';
  delete overlay.dataset.settled;
  // Animate back to center
  box.style.transition='top 1s cubic-bezier(0.4,0,0.2,1), left 1s cubic-bezier(0.4,0,0.2,1), transform 1s cubic-bezier(0.4,0,0.2,1)';
  box.style.top='calc(50% - 76px)';
  box.style.left='calc(50% - 100px)';
  box.style.transform='scale(1)';
}

window.hideGlobe=function(){
  if(!globeVisible) return;
  globeVisible=false;
  clearTimeout(idleTimer);
  window.stopGlobeLoader?.();
  idleTimer=setTimeout(()=>showGlobe(), IDLE_MS);
}

function resetIdleTimer(){
  if(!globeVisible){
    clearTimeout(idleTimer);
    idleTimer=setTimeout(()=>showGlobe(), IDLE_MS);
  }
}

initGlobe().then(()=>{
  const overlay=document.getElementById('globeOverlay');
  overlay.style.display='flex';
  tick();
  setupDrag();

  document.getElementById('map').addEventListener('click', hideGlobe);
  document.getElementById('map').addEventListener('mousemove', resetIdleTimer);
  document.getElementById('map').addEventListener('touchstart', hideGlobe, {passive:true});
});
</script>
</body>
</html>
